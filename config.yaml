refresh_interval: 900
chart_range: 1d
chart_interval: 1h
chart_style: candlestick_dotted
colorscheme: nord
edgar_email: rayx.cn@gmail.com
log_file: /Users/rayxu/tmp/finsight.log
earnings:
    source_priority:
        - edgar
        - yahoo
        - company_ir
    ir_page_registry:
        AAPL: https://www.apple.com/newsroom/
        GOOG: https://blog.google/inside-google/company-announcements/
        MSFT: https://news.microsoft.com/category/earnings/
        NVDA: https://nvidianews.nvidia.com/
        TSM: https://pr.tsmc.com/english
    search_hints:
        AAPL: Apple earnings report investor relations PDF
        GOOG: Alphabet earnings release investor relations PDF
        MSFT: Microsoft earnings release investor relations PDF
        NVDA: NVIDIA earnings release investor relations PDF
        TSM: TSMC earnings release investor relations PDF
    high_freq_polling_seconds: 60
    normal_polling_seconds: 300
    off_hours_polling_seconds: 900
    window_before_minutes: 120
    window_after_minutes: 120
    edgar_confirm_seconds: 120
    edgar_confirm_duration_mins: 30
    yahoo_backfill_seconds: 900
    yahoo_backfill_duration_mins: 240
llm:
    provider: copilot
    endpoint: ""
    model: gpt-4o
    api_key_env: ""
    project: ""
    location: ""
    context_tokens: 65536
    use_multi_agent: false
investor:
    strategies:
        - buy-and-hold
        - dca
        - growth
    risk: balanced
    horizon: 10+ years
    goals:
        - long-term capital appreciation
        - diversified across sectors

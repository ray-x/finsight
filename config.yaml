# ── ACP (Agent Client Protocol) ──────────────────────────────────────────────
# Launch AI coding agents as subprocesses and communicate via ACP over stdio.
# Supports gemini-cli, copilot-cli (gh copilot), claude-code, etc.
# Each entry spawns one agent process; prompts are routed by name.
#
# acp:
#   - name: gemini           # human-readable name used in Prompt(ctx, "gemini", ...)
#     command: gemini         # executable path
#     args: ["--acp"]        # CLI flags to enable ACP mode
#     env: []                # optional extra KEY=VALUE environment variables
#   - name: copilot
#     command: gh
#     args: ["copilot", "--acp"]
#   - name: claude
#     command: claude
#     args: ["--acp"]

# ── Copilot SDK (native Go integration) ──────────────────────────────────────
# Uses the official github.com/github/copilot-sdk/go to communicate with the
# GitHub Copilot CLI. Richer than ACP: supports model selection, system message
# customisation, streaming, tools, and permission control.
# Requires the `copilot` CLI to be installed (or set cli_path).
# Auth: uses the logged-in GitHub user by default (gh auth login).
#
# copilot_sdk:
#   cli_path: ""                  # path to copilot CLI (default: auto-detect via PATH / COPILOT_CLI_PATH)
#   model: "gpt-5"               # model id (gpt-5, claude-sonnet-4.5, etc.)
#   system_message: "Focus on financial analysis. Always cite data sources."
#   env: []                       # extra env vars for the CLI subprocess

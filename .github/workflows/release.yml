name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -short ./...

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build macOS ARM64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/finsight-darwin-arm64
          cd dist && tar czf finsight-${{ steps.version.outputs.VERSION }}-darwin-arm64.tar.gz finsight-darwin-arm64

      - name: Build Linux x86_64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/finsight-linux-amd64
          cd dist && tar czf finsight-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz finsight-linux-amd64

      - name: Build Windows x86_64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o dist/finsight-windows-amd64.exe
          cd dist && zip finsight-${{ steps.version.outputs.VERSION }}-windows-amd64.zip finsight-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/finsight-${{ steps.version.outputs.VERSION }}-darwin-arm64.tar.gz
            dist/finsight-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/finsight-${{ steps.version.outputs.VERSION }}-windows-amd64.zip
            dist/checksums.txt
